  if (sort.col === 'nombre')   sorted.sort((a,b) => sort.asc ? a.nombre.localeCompare(b.nombre) : b.nombre.localeCompare(a.nombre));
  else if (sort.col === 'hs')  sorted.sort((a,b) => { const va=((a.hs_por_mes||{})[mes]||{}).mensuales||0, vb=((b.hs_por_mes||{})[mes]||{}).mensuales||0; return sort.asc?va-vb:vb-va; });
  else if (sort.col === 'sueldo') sorted.sort((a,b) => { const va=((a.liq_por_mes||{})[mes]||{}).total||0, vb=((b.liq_por_mes||{})[mes]||{}).total||0; return sort.asc?va-vb:vb-va; });
  else if (sort.col === 'deporte') sorted.sort((a,b) => { const va=(Array.isArray(a.deporte)?a.deporte:a.deporte?[a.deporte]:[]).join(' '), vb=(Array.isArray(b.deporte)?b.deporte:b.deporte?[b.deporte]:[]).join(' '); return sort.asc?va.localeCompare(vb):vb.localeCompare(va); });
  else if (sort.col === 'roles')   sorted.sort((a,b) => { const va=((a.roles_por_mes||{})[mes]||[]).join(' '), vb=((b.roles_por_mes||{})[mes]||[]).join(' '); return sort.asc?va.localeCompare(vb):vb.localeCompare(va); });
  const rows = sorted.map((p, i) => {
    const hs      = (p.hs_por_mes  || {})[mes] || {semanales: 0, mensuales: 0};
    const liq     = (p.liq_por_mes || {})[mes] || {total: 0};
    const telHtml = p.telefono ? `<span style="font-family:'JetBrains Mono';font-size:11.5px">${p.telefono}</span>` : '<span style="color:var(--text3)">—</span>';
    const cbuHtml = p.cbu ? `<span style="font-family:'JetBrains Mono';font-size:11px">${p.cbu}</span>` : '<span style="color:var(--text3)">—</span>';
    const deps = Array.isArray(p.deporte) ? p.deporte : (p.deporte ? [p.deporte] : []);
    const depBadge = deps.length
      ? deps.map(d => `<span style="background:#e0f2fe;color:#0369a1;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap">${d}</span>`).join(' ')
      : '—';
  const rolBadge = r => {
    const colors = {
      'Profe':       ['#dcfce7','#166534'],
      'Profe tenis': ['#d1fae5','#065f46'],
      'Ayudante':    ['#e0f2fe','#0369a1'],
      'Micro':       ['#fef9c3','#854d0e'],
      'Delegado':    ['#ede9fe','#6d28d9'],
      'Coordinación':['#fee2e2','#991b1b'],
    };
    const [bg, color] = colors[r] || ['#f3f4f6','#374151'];
    return `<span style="background:${bg};color:${color};border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;white-space:nowrap">${r}</span>`;
  };
    const rolesMes = ((p.roles_por_mes||{})[mes]||[]);
    const rolesBadges = rolesMes.length ? rolesMes.map(rolBadge).join(' ') : '—';
    const hsM    = hs.mensuales ? hs.mensuales.toFixed(1) + ' hs' : '—';
    const esFijo = !!(p.todo_fijo && p.todo_fijo[mes]);
    const check  = '';
    const sueldo = liq.total ? fmtPeso(liq.total) : '—';
    const td = 'padding:8px 12px;border-bottom:1px solid var(--border)';
    return `<tr>
      <td style="${td};color:var(--text3);font-size:12px">${i+1}</td>
      <td style="${td}"><span onclick="openProfeModal('${p.nombre.replace(/'/g,"\'")}')" style="cursor:pointer;font-weight:500;border-bottom:1px dotted var(--accent);color:var(--text)">${p.nombre}</span>${check}</td>
      <td style="${td}">${depBadge}</td>
      <td style="${td}">${rolesBadges}</td>
      <td style="${td};text-align:center;color:var(--text3);white-space:nowrap">${hsM}</td>
      <td style="${td};text-align:right;color:var(--text2);white-space:nowrap">${liq.fijo ? fmtPeso(liq.fijo) : '—'}</td>
      <td style="${td};text-align:right;color:var(--text2);white-space:nowrap">${liq.variable ? fmtPeso(liq.variable) : '—'}</td>
      <td style="${td};text-align:right;font-weight:700;color:var(--mc);white-space:nowrap">${sueldo}</td>
    </tr>`;
  }).join('');
  const totalSueldos = profes_mes.reduce((s, p) => s + (((p.liq_por_mes || {})[mes] || {}).total || 0), 0);
  container.innerHTML = `
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;border-radius:12px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:var(--bg3)">
        ${th('#')} ${thSort('Nombre y Apellido','nombre')} ${thSort('Deporte','deporte')} ${thSort('Roles','roles')}
        ${thSort('Hs. Mensuales','hs')} ${thr('Sueldo fijo')} ${thr('Sueldo x hs.')} ${thSort('Sueldo total','sueldo',true)}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:var(--bg3);border-top:2px solid var(--border)">
          <td colspan="4" style="padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)">TOTAL</td>
          <td style="padding:10px 12px"></td>
          <td style="padding:10px 12px;text-align:right;font-weight:700;color:var(--text2)">${fmtPeso(profes_mes.reduce((s,p)=>s+(((p.liq_por_mes||{})[mes]||{}).fijo||0),0))}</td>
          <td style="padding:10px 12px;text-align:right;font-weight:700;color:var(--text2)">${fmtPeso(profes_mes.reduce((s,p)=>s+(((p.liq_por_mes||{})[mes]||{}).variable||0),0))}</td>
          <td style="padding:10px 12px;text-align:right;font-weight:700;font-size:15px;color:var(--mc)">${fmtPeso(totalSueldos)}</td>
        </tr>
      </tfoot>
    </table>
  </div></div>`;
}

function sortProfes(col) {
  if (!renderProfes._sort) renderProfes._sort = {col: 'nombre', asc: true};
  if (renderProfes._sort.col === col) {
    renderProfes._sort.asc = !renderProfes._sort.asc;
  } else {
    // nombre: A→Z (asc); numéricos: mayor→menor (desc)
    renderProfes._sort = {col, asc: col === 'nombre' || col === 'deporte' || col === 'roles'};
  }
  renderProfes();
}

// ── Copiar al portapapeles el detalle de horarios del profe en el mes ─────────
function copiarDetalleProfe(nombre, mes, btn) {
  const profes = (typeof PROFES !== 'undefined' ? PROFES : (DATA.profes || []));
  const p = profes.find(x => x.nombre === nombre);
  if (!p) return;
  const filas = (p.filas_det || {})[mes] || [];
  if (!filas.length) return;

  const ORDEN = ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo'];

  // Limpiar horario: "de 09:00 a 10:00 hs." → "9 a 10 hs."
  const limpiarHor = h => {
    if (!h) return '';
    let r = h.replace('de ', '');
    r = r.replace(/(\d{1,2}):(\d{2})/g, (m, hh, mm) =>
      mm === '00' ? String(parseInt(hh, 10)) : `${parseInt(hh, 10)}:${mm}`);
    return r;
  };

  // Texto descriptivo de una fila (sin el día)
  const descFila = f => {
    const dep = (f.dep || '').trim();
    const cat = (f.cat || '').trim();
    const horario = limpiarHor(f.horario || '');
    let nombreAct;
    if (dep.toLowerCase() === 'escuelas deportivas') {
      nombreAct = 'Escuelas deportivas';
    } else if (cat) {
      nombreAct = `${dep}: ${cat.toLowerCase()}`;
    } else {
      nombreAct = dep;
    }
    return horario ? `${nombreAct} de ${horario}` : nombreAct;
  };

  // Separar regulares (Semanal/Quincenal) de Puntuales/Mensuales
  const regulares = filas.filter(f => {
    const fr = f.freq || 'Semanal';
    return fr !== 'Puntual' && fr !== 'Mensual';
  });
  const puntuales = filas.filter(f => {
    const fr = f.freq || 'Semanal';
    return fr === 'Puntual' || fr === 'Mensual';
  });

  // Agrupar regulares por día
  const porDia = {};
  regulares.forEach(f => {
    const d = f.dia || '';
    (porDia[d] = porDia[d] || []).push(f);
  });

  // Ordenar cada día por horario
  Object.values(porDia).forEach(arr =>
    arr.sort((a, b) => (a.horario || '').localeCompare(b.horario || ''))
  );

  // Armar texto
  const partes = [`${nombre}:`];
  const diasOrdenados = Object.keys(porDia).sort((a, b) => {
    const ia = ORDEN.indexOf(a), ib = ORDEN.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });
  // Punto final solo si la línea no termina ya en "."
  const finPunto = s => s.endsWith('.') ? s : (s + '.');

  diasOrdenados.forEach(d => {
    partes.push('');  // línea en blanco antes de cada día
    partes.push(`Día ${d.toLowerCase()}:`);
    porDia[d].forEach(f => partes.push('- ' + finPunto(descFila(f))));
  });

  if (puntuales.length) {
    partes.push('');  // línea en blanco antes de Puntuales
    partes.push('Puntuales:');
    puntuales.forEach(f => {
      const dia = f.dia ? ` (${f.dia.toLowerCase()})` : '';
      partes.push('- ' + finPunto(descFila(f) + dia));
    });
  }

  const texto = partes.join('\n');

  // Copiar al portapapeles
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).catch(fallback);
  } else {
    fallback();
  }

  // Feedback visual en el botón
  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓';
    btn.style.background = '#dcfce7';
    btn.style.color = '#166534';
    btn.style.borderColor = '#86efac';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.background = 'none';
      btn.style.color = 'var(--text2)';
      btn.style.borderColor = 'var(--border)';
    }, 1200);
  }
}

function openProfeModal(nombre) {
  const mes = document.getElementById('sel-mes-profes')?.value || '';
  const p   = PROFES.find(x => x.nombre === nombre);
  if (!p) return;
  const filas = (p.filas_det || {})[mes] || [];
  document.getElementById('profeModalTitle').textContent = nombre;
  const th  = s => `<th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:left">${s}</th>`;
  const thr = s => `<th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:right">${s}</th>`;
  const fmtPeso = n => n ? '$ ' + Number(n).toLocaleString('es-AR') : '—';
  const freqBadge = f => {
    if (f === 'Puntual')   return `<span style="background:#fef3c7;color:#b45309;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Puntual</span>`;
    if (f === 'Quincenal') return `<span style="background:#ede9fe;color:#6d28d9;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Quincenal</span>`;
    if (f === 'Mensual')   return `<span style="background:#dbeafe;color:#1e40af;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Mensual</span>`;
    return `<span style="background:#dcfce7;color:#166534;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Semanal</span>`;
  };
  let rows = '';
  filas.forEach(f => {
    const dur    = f.dur ? f.dur.toFixed(1) + ' hs.' : '—';
    const esFP   = f.es_fijo_parcial;
    // Mostrar vh, bloque y monto. Para fijo parcial sintético solo monto.
    const vh     = (!esFP && f.vh)     ? fmtPeso(f.vh)     : '—';
    const bloque = (!esFP && f.bloque) ? fmtPeso(f.bloque) : '—';
    const monto  = esFP ? fmtPeso(f.monto)
                 : (f.monto ? fmtPeso(f.monto) : '—');
    const horario = f.horario || '—';
    rows += `<tr style="border-bottom:1px solid var(--border)${esFP ? ';background:var(--bg3)' : ''}">
      <td style="padding:7px 10px">${f.dep || '—'}</td>
      <td style="padding:7px 10px">${f.dia || '—'}</td>
      <td style="padding:7px 10px;color:var(--text2)">${f.cat || '—'}</td>
      <td style="padding:7px 10px">${f.rol || '—'}</td>
      <td style="padding:7px 10px">${freqBadge(f.freq || 'Semanal')}</td>
      <td style="padding:7px 10px;text-align:right">${vh}</td>
      <td style="padding:7px 10px;color:var(--text2);font-size:12px">${horario}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600">${dur}</td>
      <td style="padding:7px 10px;text-align:right;color:var(--text2)">${bloque}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600;color:var(--mc)">${monto}</td>
    </tr>`;
  });
  const totalHs    = filas.reduce((s, f) => s + (f.dur || 0), 0);
  const totalMonto = filas.reduce((s, f) => s + (f.monto || 0), 0);
  const liq        = ((p.liq_por_mes || {})[mes] || {}).total || 0;
  const displayTotal = liq || totalMonto;
  document.getElementById('profeModalBody').innerHTML = filas.length === 0
    ? '<p style="color:var(--text3);text-align:center;padding:24px">Sin detalle disponible para este mes</p>'
    : `<table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
        <thead style="position:sticky;top:0;background:var(--bg2);z-index:1">
          <tr style="border-bottom:2px solid var(--border)">${th('Deporte')}${th('Día')}${th('Cat.')}${th('Rol')}${th('Frecuencia')}${thr('Valor hora')}${th('Horario')}${thr('Duración')}${thr('Total bloque')}${thr('Monto')}</tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--border);font-weight:700;background:var(--bg3)">
            <td colspan="5" style="padding:8px 10px;color:var(--text3)">TOTAL</td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px;text-align:right">${totalHs.toFixed(1)} hs.</td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px;text-align:right;color:var(--mc)">${fmtPeso(displayTotal)}</td>
          </tr>
        </tfoot>
      </table>`;
  document.getElementById('profeModal').style.display = 'flex';
}

function closeProfeModal() {
  document.getElementById('profeModal').style.display = 'none';
}

// Cerrar modal con Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const modal = document.getElementById('profeModal');
    if (modal && modal.style.display !== 'none') closeProfeModal();
  }
});

window.addEventListener('DOMContentLoaded', renderProfes);
</script>
