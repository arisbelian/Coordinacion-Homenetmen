<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{
  --bg:#0a0c10;--bg2:#11141b;--bg3:#181c27;--bg4:#1f2535;
  --border:#252d3d;--text:#e8ecf4;--text2:#8892a8;--text3:#5a6478;
  --accent:#e8c84a;--mc:#06b6d4;
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f7f8fa;--bg4:#ebedf2;
  --border:#dce0e8;--text:#1a1d26;--text2:#5a6070;--text3:#8890a0;
  --accent:#b89000;--mc:#0891b2;
}
html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:700}
.header h1 span{color:var(--text3);font-weight:400;margin-left:8px;font-size:12px}
.container{max-width:960px;margin:0 auto;padding:28px 20px}
tbody td{font-family:'DM Sans',sans-serif}
tbody td.mono{font-family:'JetBrains Mono';font-size:11.5px;color:var(--text2)}
tbody tr:hover{background:rgba(0,0,0,.02)}
.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:17px;transition:all .2s}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:600px){
  html{font-size:13px}
  .container{padding:14px 12px 32px}
  .header{padding:12px 14px}
  .header h1{font-size:14px}.header h1 span{display:none}
  tbody td{padding:6px 8px;font-size:11px;white-space:nowrap}
  thead th{padding:6px 8px;font-size:10px;white-space:nowrap}
  #profeModal > div{width:100% !important;max-width:100% !important;height:100%;max-height:100%;border-radius:0}
  #profeModalBody{padding:10px 12px 16px}
}
</style>
</head>

<div class="header">

    <h1>Detalle Profes <span>Homenetmen Buenos Aires · 2026</span></h1>
  </div>
</div>

<div class="container">
  
  <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:16px 20px;margin-bottom:20px">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#92400e;margin-bottom:8px">📌 Notas</div>
    <ul style="list-style:disc;padding-left:18px"><li style="padding:4px 0;font-size:13px;color:var(--text2)">Pendiente información de profes de tenis + German Cigarra como coordinacion</li></ul>

    </div>
  </div>
  <div id="profes-container"></div>

const MESES       = ["Marzo", "Abril"];
const NOTAS       = ["Pendiente información de profes de tenis + German Cigarra como coordinacion"];

function renderProfes() {
  const container = document.getElementById('profes-container');
  if (!container) return;
  if (!PROFES.length || !MESES.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">👨‍🏫</div><div style="font-size:14px">No hay profes cargados.</div></div>';
    return;
  }
  const sel = document.getElementById('sel-mes-profes');
  const mes = sel ? sel.value : (MESES[MESES.length-1] || '');
  if (!renderProfes._sort) renderProfes._sort = {col: 'nombre', asc: true};
  const sort = renderProfes._sort;
  const thSort = (label, col, right=false) => {
    const active = sort.col === col;
    const arrow  = active ? (sort.asc ? ' ▲' : ' ▼') : '';
    const align  = right ? 'text-align:right;' : '';
    return `<th onclick="sortProfes('${col}')" style="padding:8px 12px;font-size:11px;color:${active?'var(--accent)':'var(--text3)'};font-weight:600;${align}border-bottom:2px solid var(--border);cursor:pointer;user-select:none">${label}${arrow}</th>`;
  };
  const th  = s => `<th style="padding:8px 12px;font-size:11px;color:var(--text3);font-weight:600;text-align:left;border-bottom:2px solid var(--border)">${s}</th>`;
  const thr = s => `<th style="padding:8px 12px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;border-bottom:2px solid var(--border)">${s}</th>`;
  const fmtPeso = n => n ? '$ ' + n.toLocaleString('es-AR') : '—';
  let sorted = [...PROFES];
  if (sort.col === 'nombre') sorted.sort((a,b) => sort.asc ? a.nombre.localeCompare(b.nombre) : b.nombre.localeCompare(a.nombre));
  else if (sort.col === 'hs')     sorted.sort((a,b) => { const va=((a.hs_por_mes||{})[mes]||{}).mensuales||0, vb=((b.hs_por_mes||{})[mes]||{}).mensuales||0; return sort.asc?va-vb:vb-va; });
  else if (sort.col === 'sueldo') sorted.sort((a,b) => { const va=((a.liq_por_mes||{})[mes]||{}).total||0,    vb=((b.liq_por_mes||{})[mes]||{}).total||0;    return sort.asc?va-vb:vb-va; });
  const rows = sorted.map((p, i) => {
    const hs      = (p.hs_por_mes  || {})[mes] || {semanales: 0, mensuales: 0};
    const liq     = (p.liq_por_mes || {})[mes] || {total: 0};
    const telHtml = p.telefono ? `<span style="font-family:'JetBrains Mono';font-size:11.5px">${p.telefono}</span>` : '<span style="color:var(--text3)">—</span>';
    const cbuHtml = p.cbu ? `<span style="font-family:'JetBrains Mono';font-size:11px">${p.cbu}</span>` : '<span style="color:var(--text3)">—</span>';
    const depBadge = p.deporte ? `<span style="background:#e0f2fe;color:#0369a1;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700">${p.deporte}</span>` : '—';
    const hsM   = hs.mensuales ? hs.mensuales.toFixed(1) + ' hs' : '—';
    const sueldo = liq.total   ? fmtPeso(liq.total) : '—';
    const td = 'padding:8px 12px;border-bottom:1px solid var(--border)';
    return `<tr>
      <td style="${td};color:var(--text3);font-size:12px">${i+1}</td>
      <td style="${td}"><span onclick="openProfeModal('${p.nombre.replace(/'/g,"\'")}')" style="cursor:pointer;font-weight:500;border-bottom:1px dotted var(--accent);color:var(--text)">${p.nombre}</span></td>
      <td style="${td}">${depBadge}</td>
      <td style="${td}">${telHtml}</td>
      <td style="${td}">${cbuHtml}</td>
      <td style="${td};text-align:center;color:var(--text3)">${hsM}</td>
      <td style="${td};text-align:right;font-weight:700;color:var(--mc)">${sueldo}</td>
    </tr>`;
  }).join('');
  const totalSueldos = PROFES.reduce((s, p) => s + (((p.liq_por_mes || {})[mes] || {}).total || 0), 0);
  container.innerHTML = `
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;white-space:nowrap">
      <thead><tr style="background:var(--bg3)">
        ${th('#')} ${thSort('Nombre y Apellido','nombre')} ${th('Deporte')} ${th('Teléfono')} ${th('CBU')}
        ${thSort('Hs. Mensuales','hs')} ${thSort('Sueldo mensual','sueldo',true)}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:var(--bg3);border-top:2px solid var(--border)">
          <td colspan="5" style="padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)">TOTAL</td>
          <td style="padding:10px 12px"></td>
          <td style="padding:10px 12px;text-align:right;font-weight:700;font-size:15px;color:var(--mc)">${fmtPeso(totalSueldos)}</td>
        </tr>
      </tfoot>
    </table>
  </div>`;
}

function sortProfes(col) {
  if (!renderProfes._sort) renderProfes._sort = {col: 'nombre', asc: true};
  if (renderProfes._sort.col === col) {
    renderProfes._sort.asc = !renderProfes._sort.asc;
  } else {
    // nombre: A→Z (asc); numéricos: mayor→menor (desc)
    renderProfes._sort = {col, asc: col === 'nombre'};
  }
  renderProfes();
}

function openProfeModal(nombre) {
  const mes = document.getElementById('sel-mes-profes')?.value || '';
  const p   = PROFES.find(x => x.nombre === nombre);
  if (!p) return;
  const filas = (p.filas_det || {})[mes] || [];
  document.getElementById('profeModalTitle').textContent = nombre;
  const th  = s => `<th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:left">${s}</th>`;
  const thr = s => `<th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:right">${s}</th>`;
  const fmtPeso = n => n ? '$ ' + Number(n).toLocaleString('es-AR') : '—';
  const freqBadge = f => {
    if (f === 'Puntual')   return `<span style="background:#fef3c7;color:#b45309;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Puntual</span>`;
    if (f === 'Quincenal') return `<span style="background:#ede9fe;color:#6d28d9;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Quincenal</span>`;
    if (f === 'Mensual')   return `<span style="background:#dbeafe;color:#1e40af;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Mensual</span>`;
    return `<span style="background:#dcfce7;color:#166534;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">Semanal</span>`;
  };
  let rows = '';
  filas.forEach(f => {
    const dur    = f.dur ? f.dur.toFixed(1) + ' hs.' : '—';
    const esF    = f.es_fijo;
    const esFP   = f.es_fijo_parcial;
    const vh     = (!esF && !esFP && f.vh)     ? fmtPeso(f.vh)     : '—';
    const bloque = (!esF && !esFP && f.bloque) ? fmtPeso(f.bloque) : '—';
    const monto  = esF  ? '—'
                 : esFP ? fmtPeso(f.monto)
                 : (f.monto ? fmtPeso(f.monto) : '—');
    const horario = f.horario || '—';
    rows += `<tr style="border-bottom:1px solid var(--border)${esFP ? ';background:var(--bg3)' : ''}">
      <td style="padding:7px 10px">${f.dep || '—'}</td>
      <td style="padding:7px 10px">${f.dia || '—'}</td>
      <td style="padding:7px 10px;color:var(--text2)">${f.cat || '—'}</td>
      <td style="padding:7px 10px">${f.rol || '—'}</td>
      <td style="padding:7px 10px">${freqBadge(f.freq || 'Semanal')}</td>
      <td style="padding:7px 10px;text-align:right">${vh}</td>
      <td style="padding:7px 10px;color:var(--text2);font-size:12px">${horario}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600">${dur}</td>
      <td style="padding:7px 10px;text-align:right;color:var(--text2)">${bloque}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600;color:var(--mc)">${monto}</td>
    </tr>`;
  });
  const totalHs    = filas.reduce((s, f) => s + (f.dur || 0), 0);
  const totalMonto = filas.reduce((s, f) => s + (f.monto || 0), 0);
  const liq        = ((p.liq_por_mes || {})[mes] || {}).total || 0;
  const displayTotal = liq || totalMonto;
  document.getElementById('profeModalBody').innerHTML = filas.length === 0
    ? '<p style="color:var(--text3);text-align:center;padding:24px">Sin detalle disponible para este mes</p>'
    : `<table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
        <thead style="position:sticky;top:0;background:var(--bg2);z-index:1">
          <tr style="border-bottom:2px solid var(--border)">${th('Deporte')}${th('Día')}${th('Cat.')}${th('Rol')}${th('Frecuencia')}${thr('Valor hora')}${th('Horario')}${thr('Duración')}${thr('Total bloque')}${thr('Monto')}</tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--border);font-weight:700;background:var(--bg3)">
            <td colspan="5" style="padding:8px 10px;color:var(--text3)">TOTAL</td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px;text-align:right">${totalHs.toFixed(1)} hs.</td>
            <td style="padding:8px 10px"></td>
            <td style="padding:8px 10px;text-align:right;color:var(--mc)">${fmtPeso(displayTotal)}</td>
          </tr>
        </tfoot>
      </table>`;
  document.getElementById('profeModal').style.display = 'flex';
}

function closeProfeModal() {
  document.getElementById('profeModal').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', renderProfes);
</script>
