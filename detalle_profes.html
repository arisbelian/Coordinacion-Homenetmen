[data-theme="dark"]{

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:700}
.header h1 span{color:var(--text3);font-weight:400;margin-left:8px;font-size:12px}
.container{max-width:960px;margin:0 auto;padding:28px 20px}
tbody td{font-family:'DM Sans',sans-serif}
tbody td.mono{font-family:'JetBrains Mono';font-size:11.5px;color:var(--text2)}
tbody tr:hover{background:rgba(0,0,0,.02)}
.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:17px;transition:all .2s}
</style>
</head>

const MESES       = ["Marzo", "Abril"];
const NOTAS       = ["Pendiente información de profes de tenis + German Cigarra como coordinacion"];

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
}

function renderProfes() {
  const container = document.getElementById('profes-container');
  if (!container) return;
  if (!PROFES.length || !MESES.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">👨‍🏫</div><div style="font-size:14px">No hay profes cargados.</div></div>';
    return;
  }
  const sel = document.getElementById('sel-mes-profes');
  const mes = sel ? sel.value : (MESES[MESES.length-1] || '');
  const th  = s => `<th style="padding:8px 12px;font-size:11px;color:var(--text3);font-weight:600;text-align:left;border-bottom:2px solid var(--border)">${s}</th>`;
  const thr = s => `<th style="padding:8px 12px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;border-bottom:2px solid var(--border)">${s}</th>`;
  const fmtPeso = n => n ? '$ ' + n.toLocaleString('es-AR') : '—';
  const rows = PROFES.map((p, i) => {
    const hs      = (p.hs_por_mes  || {})[mes] || {semanales: 0, mensuales: 0};
    const liq     = (p.liq_por_mes || {})[mes] || {total: 0};
    const telHtml = p.telefono ? `<span style="font-family:'JetBrains Mono';font-size:11.5px">${p.telefono}</span>` : '<span style="color:var(--text3)">—</span>';
    const cbuHtml = p.cbu ? `<span style="font-family:'JetBrains Mono';font-size:11px">${p.cbu}</span>` : '<span style="color:var(--text3)">—</span>';
    const depBadge = p.deporte ? `<span style="background:#e0f2fe;color:#0369a1;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700">${p.deporte}</span>` : '—';
    const hsS   = hs.semanales ? hs.semanales.toFixed(1) + ' hs' : '—';
    const hsM   = hs.mensuales ? hs.mensuales.toFixed(1) + ' hs' : '—';
    const sueldo = liq.total   ? fmtPeso(liq.total) : '—';
    const td = 'padding:8px 12px;border-bottom:1px solid var(--border)';
    return `<tr>
      <td style="${td};color:var(--text3);font-size:12px">${i+1}</td>
      <td style="${td}"><span onclick="openProfeModal('${p.nombre.replace(/'/g,"\'")}')" style="cursor:pointer;font-weight:500;border-bottom:1px dotted var(--accent);color:var(--text)">${p.nombre}</span></td>
      <td style="${td}">${depBadge}</td>
      <td style="${td}">${telHtml}</td>
      <td style="${td}">${cbuHtml}</td>
      <td style="${td};text-align:center;font-weight:600">${hsS}</td>
      <td style="${td};text-align:center;color:var(--text3)">${hsM}</td>
      <td style="${td};text-align:right;font-weight:700;color:var(--mc)">${sueldo}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:var(--bg3)">
        ${th('#')} ${th('Nombre y Apellido')} ${th('Deporte')} ${th('Teléfono')} ${th('CBU')}
        ${th('Hs. Semanales')} ${th('Hs. Mensuales')} ${thr('Sueldo mensual')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function openProfeModal(nombre) {
  const mes = document.getElementById('sel-mes-profes')?.value || '';
  const p   = PROFES.find(x => x.nombre === nombre);
  if (!p) return;
  const filas = (p.filas_det || {})[mes] || [];
  document.getElementById('profeModalTitle').textContent = nombre;
  const th = s => `<th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:left">${s}</th>`;
  let rows = '';
  filas.forEach(f => {
    const dur = f.dur ? f.dur.toFixed(1) + ' hs.' : '—';
    rows += `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 10px">${f.dep || '—'}</td>
      <td style="padding:7px 10px">${f.dia || '—'}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600">${dur}</td>
      <td style="padding:7px 10px;color:var(--text2)">${f.cat || '—'}</td>
      <td style="padding:7px 10px">${f.rol || '—'}</td>
    </tr>`;
  });
  const total = filas.reduce((s, f) => s + (f.dur || 0), 0);
  document.getElementById('profeModalBody').innerHTML = filas.length === 0
    ? '<p style="color:var(--text3);text-align:center;padding:24px">Sin detalle disponible para este mes</p>'
    : `<table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead style="position:sticky;top:0;background:var(--bg2);z-index:1">
          <tr style="border-bottom:2px solid var(--border)">${th('Deporte')}${th('Día')}${th('Duración')}${th('Categoría')}${th('Rol')}</tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--border);font-weight:700">
            <td colspan="2" style="padding:8px 10px;color:var(--text3)">TOTAL</td>
            <td style="padding:8px 10px;text-align:right">${total.toFixed(1)} hs.</td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>`;
  document.getElementById('profeModal').style.display = 'flex';
}

function closeProfeModal() {
  document.getElementById('profeModal').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', renderProfes);
</script>
</body>
</html>
